name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name : git semantic version
      uses: PaulHatch/semantic-version@v4.0.3 
      with:
        major_pattern: "major : "
        minor_pattern: "minor : "
        format: "${major}.${minor}.${patch}-perelease$-{increment}"
      id: version 

    - name: docker login 
      env:
        DOCKER_USER: ${{ secrets.DOCKER_USER }}
        PASSWORD_DOCK: ${{ secrets.PASSWORD_DOCK}}
        NEW_VERSION: ${{ steps.version.outputs.new_version }}
      run: |
        docker login -u $DOCKER_USER -p $PASSWORD_DOCK
        echo "new verison $NEW_VERSION"
